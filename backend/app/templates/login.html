<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SorvPel Estoque</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 380px; border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    .brand-icon { font-size: 3rem; color: #e94560; }
  </style>
</head>
<body>
  <div class="card login-card p-4">
    <div class="text-center mb-4">
      <div class="brand-icon"><i class="bi bi-snow2"></i></div>
      <h4 class="fw-bold mt-2">SorvPel Estoque</h4>
      <p class="text-muted small">Controle de Produção</p>
    </div>

    {% if error %}
    <div class="alert alert-danger alert-dismissible small py-2">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">
      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>
  </div>
</body>
</html>
