# Modo HTTP provisório — use quando não há domínio/certificado ainda.
# Troque para docker-compose.prod.yml quando tiver domínio e HTTPS.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod-http.yml up -d
services:
  nginx:
    ports:
      - "80:80"
    # Usa config HTTP simples (sem TLS), ignora o entrypoint de produção
    entrypoint: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
