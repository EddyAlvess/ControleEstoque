[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    Chris--A/Keypad @ ^3.1.1
    ayushsharma22/ElegantOTA @ ^3.1.5

monitor_speed = 115200
upload_speed  = 921600
build_flags   = -DCORE_DEBUG_LEVEL=1

; Copia config_example.h como template — NUNCA versionar config_local.h
; Crie esp32/src/config_local.h baseado em config.h e ajuste suas credenciais
